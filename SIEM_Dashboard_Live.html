<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080b08;color:#c8d6c8;font-family:'Share Tech Mono',monospace;min-height:100vh}
@keyframes sc{0%{top:-2px}100%{top:100vh}}
@keyframes fi{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bl{0%,100%{border-color:#ff174440}50%{border-color:#ff1744}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1a2e1a;border-radius:2px}
.scanline{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.scanline::after{content:'';position:absolute;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00e67630,transparent);animation:sc 5s linear infinite}
.header{background:#0a0f0a;border-bottom:2px solid #00e676;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 0 40px #00e67615}
.tabs{display:flex;background:#090d09;border-bottom:1px solid #152015}
.tab{flex:1;padding:11px 4px;border:none;cursor:pointer;font-family:'Share Tech Mono';font-size:10px;letter-spacing:1px;background:transparent;color:#3a5a3a;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{background:#00e67612;color:#00e676;border-bottom-color:#00e676}
.content{padding:14px}
.card{background:#0b100b;border:1px solid #152015;border-radius:6px;overflow:hidden;margin-bottom:10px}
.hidden{display:none}
</style>
</head>

  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="clock" style="font-size:15px;color:#00e676"></span>
    <div style="display:flex;align-items:center;gap:5px;background:#00e67612;border:1px solid #00e67630;border-radius:4px;padding:3px 8px">
      <div style="width:7px;height:7px;border-radius:50%;background:#00e676;box-shadow:0 0 8px #00e676;animation:pu 2s infinite"></div>
      <span style="font-size:10px;color:#00e676">ONLINE</span>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('dash')" id="t-dash">📊 DASH</button>
  <button class="tab" onclick="showTab('feed')" id="t-feed">🔍 SOC FEED</button>
  <button class="tab" onclick="showTab('rules')" id="t-rules">🔥 FIREWALL RULES</button>

<div class="content">

  <div id="p-feed" class="hidden"></div>
  <div id="p-rules" class="hidden"></div>

function showTab(t){curTab=t;selId=null;ruleOpen=null;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('t-'+t).classList.add('active');
  ['dash','feed','rules'].forEach(p=>{document.getElementById('p-'+p).className=p===t?'':'hidden'});
  render();
}

function badge(txt,bg,col,dir){return`<span style="font-size:9px;padding:2px 6px;border-radius:3px;background:${bg};border:1px solid ${col}25;color:${col};${dir?'direction:ltr':''};display:inline-block;margin:2px">${txt}</span>`}

        </div>`).join("")}

      <div style="padding:8px 12px;border-bottom:1px solid #152015"><span style="font-size:11px;color:#ff1744;letter-spacing:2px">⚠️ TOP ATTACKER IPs</span></div>

    </div>
    <div class="card">
      <div style="padding:8px 12px;border-bottom:1px solid #152015;display:flex;justify-content:space-between"><span style="font-size:11px;color:#00e676;letter-spacing:2px">🔴 LATEST</span><button onclick="showTab('feed')" style="background:none;border:1px solid #00e67630;color:#00e676;font-family:'Share Tech Mono';font-size:9px;padding:2px 7px;border-radius:3px;cursor:pointer">ALL →</button></div>
      ${alerts.slice(0,5).map(a=>`<div onclick="showTab('feed')" style="padding:8px 12px;border-bottom:1px solid #080c08;display:flex;align-items:center;gap:8px;cursor:pointer"><span>${SV[a.s].e}</span><div style="flex:1;min-width:0"><div style="font-size:11px;color:${SV[a.s].c};font-weight:bold">${a.r} — ${a.n}</div><div style="font-size:10px;color:#3a5a3a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl">${a.d}</div></div>${a.si&&a.si!=="-"?`<span style="font-size:9px;color:#ff910060;direction:ltr;flex-shrink:0">${a.si}</span>`:""}</div>`).join("")}

          <button style="flex:1;padding:10px;border-radius:4px;font-family:'Share Tech Mono';font-size:11px;cursor:pointer;background:#ffd60010;color:#ffd600;border:1px solid #ffd60040">📋 דווח</button>
          <button style="flex:1;padding:10px;border-radius:4px;font-family:'Share Tech Mono';font-size:11px;cursor:pointer;background:#0b100b;color:#5a7a5a;border:1px solid #152015">✅ סגור</button>
        </div>
      </div>`:""}`}).join("")}`;

  // RULES (pfSense style)
  const rHits={};alerts.forEach(a=>rHits[a.r]=(rHits[a.r]||0)+1);
  document.getElementById('p-rules').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:11px;color:#00e676;letter-spacing:2px">🔥 FIREWALL RULES — pfSense Style</span>
      <span style="font-size:10px;padding:2px 7px;border-radius:3px;background:#00e67612;color:#00e676">13/13 ✓</span>
    </div>
    <div style="background:#0d140d;border:1px solid #00e67630;border-radius:6px 6px 0 0;padding:8px 10px;display:grid;grid-template-columns:18px 52px 44px 1fr;gap:6px;border-bottom:2px solid #00e676">
      <span style="font-size:8px;color:#00e676">⚡</span>
      <span style="font-size:8px;color:#00e676;letter-spacing:1px">ACTION</span>
      <span style="font-size:8px;color:#00e676;letter-spacing:1px">PROTO</span>
      <span style="font-size:8px;color:#00e676;letter-spacing:1px">DESCRIPTION</span>
    </div>
    ${FW.map((r,i)=>{const isB=r.act==="BLOCK";const h=rHits[r.id]||0;const op=ruleOpen===r.id;return`
    <div>
      <div onclick="toggleRule('${r.id}')" style="background:${op?"#0d140d":"#0a0f0a"};border:1px solid ${isB?"#ff174425":"#ffd60025"};border-top:none;padding:8px 10px;display:grid;grid-template-columns:18px 52px 44px 1fr;gap:6px;align-items:center;cursor:pointer;${i===FW.length-1&&!op?"border-radius:0 0 6px 6px":""}">
        <div style="width:8px;height:8px;border-radius:50%;background:#00e676;box-shadow:0 0 4px #00e676"></div>
        <span style="font-size:9px;padding:2px 4px;border-radius:3px;text-align:center;background:${isB?"#ff174420":"#ffd60015"};color:${isB?"#ff1744":"#ffd600"};font-weight:bold;white-space:nowrap">${isB?"❌ BLOCK":"⚠️ ALERT"}</span>
        <span style="font-size:9px;color:#8aaa8a;text-align:center">${r.pr}</span>
        <div style="display:flex;justify-content:space-between;align-items:center;min-width:0">
          <div><span style="font-size:10px;color:#00e676;font-weight:bold">${r.id} </span><span style="font-size:9px;color:#6a8a6a">${r.desc.substring(0,30)}${r.desc.length>30?"...":""}</span></div>
          ${h>0?`<span style="font-size:8px;padding:1px 4px;border-radius:3px;background:#ff174420;color:#ff1744;flex-shrink:0;margin-left:4px">${h}</span>`:""}
        </div>
      </div>
      ${op?`<div style="background:#060b06;border:1px solid #00e67625;border-top:none;padding:12px;animation:fi .3s ease">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
          ${[["Source",r.src],["Src Port",r.sp],["Destination",r.dst],["Dst Port",r.dp],["Direction",r.dir],["Gateway","*"],["Schedule","Always"],["Log Source",r.log]].map(([l,v])=>`
            <div style="background:#080c08;border:1px solid #152015;border-radius:4px;padding:6px 8px">
              <div style="font-size:7px;color:#2a3e2a;letter-spacing:2px;margin-bottom:2px">${l.toUpperCase()}</div>
              <div style="font-size:11px;color:#8aaa8a;direction:ltr">${v}</div>
            </div>`).join("")}
        </div>
        <div style="background:#080c08;border:1px solid #152015;border-radius:4px;padding:6px 8px;margin-bottom:6px">
          <div style="font-size:7px;color:#2a3e2a;letter-spacing:2px;margin-bottom:2px">DESCRIPTION</div>
          <div style="font-size:10px;color:#8aaa8a;direction:rtl">${r.desc}</div>
        </div>
        <div style="display:flex;gap:6px">
          <div style="flex:1;background:#080c08;border:1px solid #152015;border-radius:4px;padding:6px 8px">
            <div style="font-size:7px;color:#2a3e2a;letter-spacing:2px;margin-bottom:2px">MITRE ATT&CK</div>
            <div style="font-size:12px;color:#00e676">${r.mi}</div>
          </div>
          <div style="flex:1;background:#080c08;border:1px solid #152015;border-radius:4px;padding:6px 8px">
            <div style="font-size:7px;color:#2a3e2a;letter-spacing:2px;margin-bottom:2px">HITS</div>
            <div style="font-size:12px;color:${h>0?"#ff9100":"#3a5a3a"}">${h} alerts</div>
          </div>
        </div>
      </div>`:""}
    </div>`}).join("")}`;

  document.getElementById('footer').textContent=`📡 CONNECTED • ${alerts.length} ALERTS • 13 RULES • 1 ENDPOINT`;
}

function toggleAlert(id){selId=selId===id?null:id;render()}
function toggleRule(id){ruleOpen=ruleOpen===id?null:id;render()}

// Init
showTab('dash');
</script>
</body>
</html>
